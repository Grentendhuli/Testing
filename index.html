    <link rel="canonical" href="https://landlord-bot-live.vercel.app" />
    
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- Safari Fallback: Show content even if JS fails -->
    <style>
      .safari-fallback { display: none; }
      .no-js .safari-fallback { display: block !important; }
      @media all {
        html:not(.js-loaded) .safari-fallback { display: block !important; }
      }
    </style>
    <noscript>
      <style>.safari-fallback { display: block !important; }</style>
    </noscript>
    
    <!-- Google Analytics 4 - Placeholder for GA_ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      // Configure with placeholder - will be updated when VITE_GA_MEASUREMENT_ID is set
      const gaId = localStorage.getItem('GA_MEASUREMENT_ID') || 'GA_MEASUREMENT_ID';
      gtag('config', gaId, {
        'anonymize_ip': true,
        'send_page_view': false,  // We'll track page views manually for SPA
        'transport_type': 'beacon',
        'custom_map': {
          'dimension1': 'user_tier',
          'dimension2': 'signup_method',
          'dimension3': 'unit_count'
        }
      });
      
      // Make gtag available globally
      window.gtag = gtag;
    </script>
    
    <script>
      // Detect Safari and log to console
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      if (isSafari) {
        console.log('[Safari Detection] Safari browser detected');
        window.safariDetected = true;
      }
      
      // Catch any errors during load
      window.addEventListener('error', function(e) {
        console.error('[Global Error]', e.message, 'at', e.filename, ':', e.lineno);
      });
    </script>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    
    <!-- Fallback for Safari/JS issues -->
    <div class="safari-fallback" style="padding: 20px; text-align: center; font-family: system-ui;">
      <h2 style="color: #f59e0b;">🔄 Loading...</h2>
      <p>If this page doesn't load, please try:</p>
      <ol style="text-align: left; display: inline-block;">
        <li>Clear Safari cache: Settings → Safari → Clear History and Website Data</li>
        <li>Refresh with Cmd+Shift+R (or Ctrl+Shift+R on Windows)</li>
        <li>Try Chrome or Firefox instead</li>
      </ol>
    </div>
    
    <script>
      // Mark that JS loaded
      document.documentElement.classList.add('js-loaded');
      
      // Register service worker for PWA support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registered:', registration.scope);
            })
            .catch((error) => {
              console.log('[PWA] Service Worker registration failed:', error);
            });
        });
      }
      
      // Store deferred install prompt for PWA
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        window.deferredPrompt = e;
        console.log('[PWA] Install prompt saved');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Schema.org Structured Data -->
    <script type="application/ld+json" src="/schema-software.json"></script>
    <script type="application/ld+json" src="/schema-localbusiness.json"></script>
  </body>
