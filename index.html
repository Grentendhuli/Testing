    <!-- Canonical URL -->
    <link rel="canonical" href="https://landlord-bot-testing.vercel.app" />

    <!-- Performance: Preconnect to critical domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://*.supabase.co" />
    <link rel="preconnect" href="https://landlordbot-ai.grentendhuli.workers.dev" />

    <!-- CRITICAL CSS: Above-the-fold styles for LCP -->
    <style>
      /* === CRITICAL CSS - Above the fold === */
      /* Reset & Base */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      
      /* Design Tokens */
      :root {
        --lb-base: #F8FAFC;
        --lb-surface: #FFFFFF;
        --lb-border: #E2E8F0;
        --lb-orange: #F59E0B;
        --lb-text-primary: #0F172A;
        --lb-text-secondary: #1F2937;
        --lb-text-muted: #475569;
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        --header-height: 64px;
        --sidebar-width: 260px;
      }
      
      /* Critical Layout */
      html, body, #root {
        background-color: var(--lb-base);
        min-height: 100vh;
        color: var(--lb-text-primary);
        font-family: var(--font-sans);
        line-height: 1.5;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Loading State - Skeleton */
      .skeleton {
        background: linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s ease-in-out infinite;
        border-radius: 0.375rem;
      }
      @keyframes skeleton-loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      /* Header placeholder */
      .header-critical {
        height: var(--header-height);
        background: var(--lb-surface);
        border-bottom: 1px solid var(--lb-border);
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 30;
      }
      
      /* Main content area with padding for fixed header */
      .main-content-critical {
        padding-top: var(--header-height);
        min-height: 100vh;
      }
      
      /* Spinner for async content */
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #E2E8F0;
        border-top-color: var(--lb-orange);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      
      /* Reduced motion preference */
      @media (prefers-reduced-motion: reduce) {
        .skeleton, .spinner { animation: none; }
      }
      
      /* iOS Safe Area Support */
      @supports (padding: max(0px)) {
        .safe-area-top { padding-top: max(env(safe-area-inset-top), 0px); }
        .safe-area-bottom { padding-bottom: max(env(safe-area-inset-bottom), 0px); }
      }
    </style>
    
    <!-- Performance: Preload critical fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHuS_nVMrMxCp50SjIw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2" as="font" type="font/woff2" crossorigin />
    
    <!-- Performance: Preload critical SVG assets -->
    <link rel="preload" href="/brand/landlordbot-logo.svg" as="image" type="image/svg+xml" />
    
    <!-- Fonts with display=swap for faster rendering -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    
    <!-- Safari Fallback: Show content even if JS fails -->
    <style>
      .safari-fallback { display: none; }
      .no-js .safari-fallback { display: block !important; }
      @media all {
        html:not(.js-loaded) .safari-fallback { display: block !important; }
      }
    </style>
    <noscript>
      <style>.safari-fallback { display: block !important; }</style>
    </noscript>
    
    <!-- Google Analytics 4 - Placeholder for GA_ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      // Configure with placeholder - will be updated when VITE_GA_MEASUREMENT_ID is set
      const gaId = localStorage.getItem('GA_MEASUREMENT_ID') || 'GA_MEASUREMENT_ID';
      gtag('config', gaId, {
        'anonymize_ip': true,
        'send_page_view': false,  // We'll track page views manually for SPA
        'transport_type': 'beacon',
        'custom_map': {
          'dimension1': 'user_tier',
          'dimension2': 'signup_method',
          'dimension3': 'unit_count'
        }
      });
      
      // Make gtag available globally
      window.gtag = gtag;
    </script>
    
    <script>
      // Detect Safari and log to console
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      if (isSafari) {
        console.log('[Safari Detection] Safari browser detected');
        window.safariDetected = true;
      }
      
      // CRITICAL: Global error handler to show errors before React loads
      window.__CRASH_ERRORS__ = [];
      window.addEventListener('error', function(e) {
        console.error('[Global Error]', e.message, 'at', e.filename, ':', e.lineno);
        window.__CRASH_ERRORS__.push({
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
          error: e.error?.toString?.() || 'N/A'
        });
        
        // Show error on screen for mobile debugging
        const errorDiv = document.getElementById('global-error-display');
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML += '<p style="margin:5px 0;font-size:12px;word-break:break-word;"><strong>Error:</strong> ' + 
            e.message + ' (at ' + (e.filename || 'unknown') + ':' + e.lineno + ')</p>';
        }
      });
      
      // Also catch unhandled promise rejections
      window.addEventListener('unhandledrejection', function(e) {
        console.error('[Unhandled Rejection]', e.reason);
        window.__CRASH_ERRORS__.push({
          message: 'Unhandled Promise: ' + (e.reason?.message || e.reason),
          filename: 'promise',
          lineno: 0,
          type: 'rejection'
        });
        
        const errorDiv = document.getElementById('global-error-display');
        if (errorDiv) {
          errorDiv.style.display = 'block';
          errorDiv.innerHTML += '<p style="margin:5px 0;font-size:12px;word-break:break-word;color:#991b1b;"><strong>Promise Error:</strong> ' + 
            (e.reason?.message || e.reason) + '</p>';
        }
      });
    </script>
  </head>
  <body class="font-sans antialiased">
    <!-- Global error display for mobile debugging -->
    <div id="global-error-display" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#fee2e2;border-bottom:2px solid #ef4444;padding:10px;font-family:monospace;font-size:12px;max-height:50vh;overflow:auto;">
      <strong style="color:#991b1b;">⚠️ JavaScript Errors Detected:</strong>
    </div>
    
    <div id="root"></div>
    
    <!-- Fallback for Safari/JS issues -->
    <div class="safari-fallback" style="padding: 20px; text-align: center; font-family: system-ui;">
      <h2 style="color: #f59e0b;">🔄 Loading...</h2>
      <p>If this page doesn't load, please try:</p>
      <ol style="text-align: left; display: inline-block;">
        <li>Clear Safari cache: Settings → Safari → Clear History and Website Data</li>
        <li>Refresh with Cmd+Shift+R (or Ctrl+Shift+R on Windows)</li>
        <li>Try Chrome or Firefox instead</li>
      </ol>
    </div>
    
    <script>
      // Mark that JS loaded
      document.documentElement.classList.add('js-loaded');
    </script>
    
    <!-- Service Worker Registration -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/sw.js')
              .then(function(registration) {
                console.log('[SW] Registered:', registration.scope);
                
                // Listen for updates
                registration.addEventListener('updatefound', function() {
                  const newWorker = registration.installing;
                  if (newWorker) {
                    newWorker.addEventListener('statechange', function() {
                      if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        console.log('[SW] New version available');
                        // Show update notification
                        if (window.confirm('A new version is available! Reload to update?')) {
                          newWorker.postMessage({ type: 'SKIP_WAITING' });
                          window.location.reload();
                        }
                      }
                    });
                  }
                });
              })
              .catch(function(error) {
                console.log('[SW] Registration failed:', error);
              });
          });
          
          // Listen for messages from service worker
          navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data.type === 'SW_ACTIVATED') {
              console.log('[SW] Activated version:', event.data.version);
            }
          });
        }
      })();
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
