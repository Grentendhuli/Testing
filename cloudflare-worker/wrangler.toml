name = "landlordbot-worker"
main = "src/index.js"
compatibility_date = "2024-03-25"

# Free tier limits:
# - 100,000 requests/day
# - 10ms CPU time/request (plenty for AI calls)
# - 128MB RAM

[env.production]
name = "landlordbot-worker"

[env.staging]
name = "landlordbot-worker-staging"

# Environment variables (set via `wrangler secret put` or dashboard)
# GEMINI_API_KEY = ""
# SENDGRID_API_KEY = ""
# FROM_EMAIL = ""
# VAPI_API_KEY = ""
# VAPI_ASSISTANT_ID = ""
# VAPI_PHONE_NUMBER_ID = ""
# ENVIRONMENT = "production"

# Optional: Add custom domains
# routes = [
#   { pattern = "api.landlordbot.live", custom_domain = true }
# ]

# KV storage (if needed for caching)
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"
