<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline | LandlordBot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      color: #1e293b;
      margin-bottom: 12px;
    }
    p {
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .queue-status {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      display: none;
    }
    .queue-status.show {
      display: block;
    }
    .queue-count {
      font-weight: 600;
      color: #d97706;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #f59e0b;
      color: white;
      border: none;
    }
    .btn-primary:hover {
      background: #d97706;
    }
    .btn-secondary {
      background: white;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover {
      background: #f8fafc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>Your changes are being saved locally and will sync automatically when you reconnect.</p>
    
    <div class="queue-status" id="queueStatus">
      <span class="queue-count" id="queueCount">0</span> changes waiting to sync
    </div>
    
    <div class="buttons">
      <button class="btn-primary" onclick="window.location.reload()">Try Again</button>
      <button class="btn-secondary" onclick="window.location.href='/'">Go Home</button>
    </div>
    
    <p style="margin-top: 24px; font-size: 12px; color: #94a3b8;">
      If this error persists, <a href="#" onclick="clearCacheAndReload();return false;" style="color: #64748b;">clear cache and reload</a>
    </p>
  </div>
  
  <script>
    // Clear service worker cache and reload
    async function clearCacheAndReload() {
      if ('serviceWorker' in navigator) {
        const registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(r => r.unregister()));
        console.log('[SW] Unregistered all service workers');
      }
      window.location.reload();
    }
    
    // Check for queued items in localStorage
    const queue = JSON.parse(localStorage.getItem('offline-mutation-queue') || '[]');
    if (queue.length > 0) {
      document.getElementById('queueStatus').classList.add('show');
      document.getElementById('queueCount').textContent = queue.length;
    }
  </script>
</body>
</html>
