  <rect x="0" y="0" width="1200" height="8" fill="#f59e0b"/>
  
  <!-- Building Icon -->
  <g transform="translate(100, 180)">
    <rect x="0" y="40" width="120" height="160" fill="#ffffff" rx="4"/>
